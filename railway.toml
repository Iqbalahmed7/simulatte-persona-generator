[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
startCommand = "( alembic upgrade head 2>&1; echo ALEMBIC_EXIT=$?; uvicorn src.api.main:app --host 0.0.0.0 --port ${PORT:-8000} 2>&1; echo UVICORN_EXIT=$? ); echo PROCESS_DONE_KEEPALIVE; sleep 300"
