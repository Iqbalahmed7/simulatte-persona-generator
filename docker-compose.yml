version: "3.9"
services:
  persona-generator:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}
      - COHORT_STORE_DIR=/data/cohorts
    volumes:
      - cohort_data:/data/cohorts

volumes:
  cohort_data:
